<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Password Reset Complete - CareQueue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-['Inter'] min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 max-w-md w-full text-center space-y-5">
        <span class="text-4xl">🎉</span>
        <h2 class="text-2xl font-extrabold text-slate-900">Password Updated!</h2>
        <p class="text-sm text-slate-500 leading-relaxed">Your password has been changed successfully. You can now use your new credentials to access your terminal.</p>
        <div class="border-t border-slate-100 pt-4">
            <a href="{% url 'login' %}" class="inline-block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl text-xs uppercase tracking-wider transition shadow-lg shadow-blue-600/20">Sign In Now</a>
        </div>
    </div>
</body>
</html>
