<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Reset Password - CareQueue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-['Inter'] min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 max-w-md w-full space-y-6">
        <div class="text-center">
            <span class="text-3xl">🔄</span>
            <h2 class="text-2xl font-extrabold text-slate-900 mt-2">Forgot Password?</h2>
            <p class="text-xs text-slate-500 mt-1">Enter your institutional email to receive a secure reset link.</p>
        </div>
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div class="flex flex-col space-y-1.5 text-sm auth-form">
                <label class="text-[11px] font-bold uppercase text-slate-400 tracking-wider">Email Address</label>
                {{ form.email }}
                {% for error in form.email.errors %}<span class="text-xs text-red-500 font-medium">{{ error }}</span>{% endfor %}
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl text-xs uppercase tracking-wider transition duration-200 shadow-lg shadow-blue-600/20">Send Reset Link</button>
        </form>
        <div class="text-center border-t border-slate-100 pt-4 text-xs text-slate-500">
            Remembered password? <a href="{% url 'login' %}" class="text-blue-600 font-bold hover:underline">Log In here</a>
        </div>
    </div>
    <script>
        document.querySelector('.auth-form input').className = "w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold text-slate-700 focus:outline-none focus:border-blue-500 transition";
    </script>
</body>
</html>
