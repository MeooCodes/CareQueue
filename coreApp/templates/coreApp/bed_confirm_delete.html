<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Delete - CareQueue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50/50 flex items-center justify-center min-h-screen font-['Inter'] px-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200 max-w-sm w-full text-center space-y-4">
        <div class="w-16 h-16 bg-red-50 text-red-600 text-2xl flex items-center justify-center rounded-full mx-auto">⚠️</div>
        <div>
            <h2 class="text-xl font-bold text-slate-900">Remove Asset?</h2>
            <p class="text-xs text-slate-500 mt-1">Are you sure you want to permanently delete the <strong class="text-slate-800">{{ bed.get_bed_type_display }}</strong> registration for <strong class="text-slate-800">{{ bed.hospital.name }}</strong>?</p>
        </div>
        <form method="POST" class="flex gap-3 pt-2">
            {% csrf_token %}
            <a href="{% url 'dashboard' %}" class="w-1/2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl text-xs transition">Cancel</a>
            <button type="submit" class="w-1/2 bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl text-xs transition shadow-md shadow-red-600/10">Confirm Delete</button>
        </form>
    </div>
</body>
</html>
