<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CareQueue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50/20 to-slate-100 flex flex-col min-h-screen justify-center items-center p-4 sm:p-6 antialiased">

    <div class="max-w-md w-full bg-white/80 backdrop-blur-md border border-slate-200/60 rounded-3xl p-6 sm:p-10 shadow-xl shadow-slate-200/50 space-y-6">
        
        <div class="text-center space-y-2">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-blue-600/10 text-blue-600 text-xl font-bold mb-1">
                🔐
            </div>
            <h1 class="text-2xl sm:text-3xl font-black text-slate-950 tracking-tight">Welcome Back</h1>
            <p class="text-sm text-slate-500 font-medium">Log in to manage your dashboard or track medical resources.</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            
            <div class="space-y-4 text-sm text-slate-700 font-medium tracking-tight">
                {% for field in form %}
                    <div class="flex flex-col space-y-1.5">
                        <label class="text-slate-900 font-bold text-xs sm:text-sm tracking-wide">{{ field.label }}</label>
                        
                        <div class="relative [&_input]:w-full [&_input]:border [&_input]:border-slate-200 [&_input]:rounded-2xl [&_input]:px-4 [&_input]:py-3 [&_input]:bg-slate-50/50 [&_input]:text-slate-800 [&_input]:focus:outline-none [&_input]:focus:ring-4 [&_input]:focus:ring-blue-500/10 [&_input]:focus:border-blue-500 [&_input]:transition-all [&_input]:shadow-inner">
                            {{ field }}
                        </div>

                        {% for error in field.errors %}
                            <p class="text-xs text-red-600 font-semibold flex items-center gap-1.5 mt-1 bg-red-50 px-3 py-1.5 rounded-lg border border-red-100">
                                <span>⚠️</span> {{ error }}
                            </p>
                        {% endfor %}
                    </div>
                {% endfor %}
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 active:scale-[0.98] text-white font-bold py-3.5 px-4 rounded-2xl transition-all shadow-lg shadow-blue-600/20 text-sm sm:text-base tracking-wide mt-2">
                Sign In
            </button>
        </form>

        <div class="text-center text-xs text-slate-500 space-y-4 pt-2">
            <div class="relative flex py-1 items-center">
                <div class="flex-grow border-t border-slate-200/60"></div>
                <span class="flex-shrink mx-3 text-slate-400 text-[10px] font-bold uppercase tracking-widest">New to CareQueue?</span>
                <div class="flex-grow border-t border-slate-200/60"></div>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <a href="{% url 'user_register' %}" class="bg-blue-50/50 hover:bg-blue-50 border border-blue-100/70 rounded-2xl py-3 px-2 text-blue-700 font-bold transition text-center">
                    🙋‍♂️ Patient Register
                </a>
                <a href="{% url 'register' %}" class="bg-emerald-50/50 hover:bg-emerald-50 border border-emerald-100/70 rounded-2xl py-3 px-2 text-emerald-700 font-bold transition text-center">
                    🏥 Hospital Portal
                </a>
            </div>
        </div>
    </div>

</body>
</html>
