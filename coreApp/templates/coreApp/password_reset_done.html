<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Reset Link Sent - CareQueue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-['Inter'] min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 max-w-md w-full text-center space-y-5">
        <span class="text-4xl">✉️</span>
        <h2 class="text-2xl font-extrabold text-slate-900">Check Your Inbox</h2>
        <p class="text-sm text-slate-500 leading-relaxed">We've sent a secure password reset link to your email. Please check your spam folder if you don't see it within a few minutes.</p>
        <div class="border-t border-slate-100 pt-4">
            <a href="{% url 'login' %}" class="inline-block bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold px-6 py-2.5 rounded-xl text-xs uppercase tracking-wider transition">Return to Login</a>
        </div>
    </div>
</body>
</html>
