<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Payment Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-3xl p-8 text-center space-y-4">
        <div class="w-16 h-16 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center mx-auto text-3xl">✓</div>
        <h1 class="text-2xl font-black text-emerald-400">Payment Successful!</h1>
        <p class="text-sm text-slate-400"><h2>{{ message }}</h2>
        <a href="{% url 'dashboard' %}" class="inline-block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-sm transition">Back to Dashboard</a>
    </div>
</body>
</html>
